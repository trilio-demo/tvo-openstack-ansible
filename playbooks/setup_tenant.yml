---
# setup_tenant.yml
# Create all demo OpenStack tenant resources from scratch.
# Shared infra (networks, security groups, keypairs, images) must already exist.
# Idempotent — safe to re-run; existing resources are left unchanged.
#
# Usage — all demos:
#   ansible-playbook playbooks/setup_tenant.yml
#
# Usage — single demo:
#   ansible-playbook playbooks/setup_tenant.yml --tags fw
#   ansible-playbook playbooks/setup_tenant.yml --tags app
#   ansible-playbook playbooks/setup_tenant.yml --tags pg

- name: Setup demo tenant resources
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ lookup('env', 'VIRTUAL_ENV') }}/bin/python3"
    cloud_init_file: "{{ playbook_dir }}/../cloud-init-password.yaml"
    openstack_bin: "{{ playbook_dir }}/../.venv/bin/openstack"
    os_env:
      OS_CLOUD: "{{ os_cloud }}"
      OS_CLIENT_CONFIG_FILE: "{{ playbook_dir }}/../clouds.yaml"
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ playbook_dir }}/../clouds.yaml"
  vars_files:
    - ../vars/main.yml

  tasks:

    # ── Phase 1: Prerequisite checks ──────────────────────────────────────────
    # Fail fast before creating anything if shared infra is missing.

    - name: Check prod-network exists (project-scoped)
      openstack.cloud.networks_info:
        cloud: "{{ os_cloud }}"
        name: prod-network
        filters:
          project_id: "{{ os_project_id }}"
      register: _prod_net
      failed_when: _prod_net.networks | length == 0
      tags: always

    - name: Check data-network exists (project-scoped)
      openstack.cloud.networks_info:
        cloud: "{{ os_cloud }}"
        name: data-network
        filters:
          project_id: "{{ os_project_id }}"
      register: _data_net
      failed_when: _data_net.networks | length == 0
      tags: always

    - name: Check security group exists
      openstack.cloud.security_group_info:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_sg }}"
        project_id: "{{ os_project_id }}"
      register: _sg
      failed_when: _sg.security_groups | length == 0
      tags: always

    - name: Check keypair exists
      openstack.cloud.keypair_info:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_keypair }}"
      register: _kp
      failed_when: _kp.keypairs | length == 0
      tags: always

    - name: Check required flavors exist
      openstack.cloud.compute_flavor_info:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
      register: _flavor
      failed_when: _flavor.flavors | length == 0
      loop:
        - m1.tiny
      tags: always

    - name: Check cirros image exists
      openstack.cloud.image_info:
        cloud: "{{ os_cloud }}"
        image: cirros
      register: _image
      failed_when: _image.images | length == 0
      tags: always

    - name: Prerequisite checks passed
      ansible.builtin.debug:
        msg: "All prerequisite resources found. Proceeding with resource creation."
      tags: always

    # ── Phase 2a: Firewall resources ──────────────────────────────────────────
    # 1 VM on prod-network, boot vol (1G from cirros) + data vol (4G), floating IP

    - name: Create Firewall boot volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-bootvol"
        size: 1
        image: cirros
        state: present
        wait: true
      tags: fw

    - name: Create Firewall data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-datavol"
        size: 4
        state: present
        wait: true
      tags: fw

    - name: Create Firewall server
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-vm"
        boot_volume: "{{ demo_prefix }}firewall-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _prod_net.networks[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        volumes:
          - "{{ demo_prefix }}firewall-datavol"
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      tags: fw

    # ── Phase 2b: WebApp resources ────────────────────────────────────────────
    # 3 VMs: LB (prod-network, floating IP),
    #         FE (prod-network + data-network, no FIP),
    #         BE (data-network, no FIP, + data vol)

    - name: Create WebApp boot volumes
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        size: 1
        image: cirros
        state: present
        wait: true
      loop:
        - "{{ demo_prefix }}webapp-lb-bootvol"
        - "{{ demo_prefix }}webapp-fe-bootvol"
        - "{{ demo_prefix }}webapp-be-bootvol"
      tags: app

    - name: Create WebApp BE data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}webapp-be-datavol"
        size: 4
        state: present
        wait: true
      tags: app

    - name: Create WebApp LB server (prod-network, floating IP)
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}webapp-lb"
        boot_volume: "{{ demo_prefix }}webapp-lb-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _prod_net.networks[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      tags: app

    - name: Create WebApp FE server (prod-network + data-network, no floating IP)
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}webapp-fe"
        boot_volume: "{{ demo_prefix }}webapp-fe-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _prod_net.networks[0].id }}"
          - net-id: "{{ _data_net.networks[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        auto_ip: false
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      tags: app

    - name: Create WebApp BE server (data-network, no floating IP)
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}webapp-be"
        boot_volume: "{{ demo_prefix }}webapp-be-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _data_net.networks[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        volumes:
          - "{{ demo_prefix }}webapp-be-datavol"
        auto_ip: false
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      tags: app

    # ── Phase 2c: Database resources ──────────────────────────────────────────
    # 2 VMs:
    #   Primary: prod-network + data-network (via port), boot vol + data vol,
    #            floating IP assigned post-create (auto_ip fails on dual-NIC)
    #   Replica: data-network, boot vol + data vol, no floating IP

    - name: Create Database Primary boot volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-primary-bootvol"
        size: 1
        image: cirros
        state: present
        wait: true
      tags: pg

    - name: Create Database Primary data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-primary-datavol"
        size: 4
        state: present
        wait: true
      tags: pg

    - name: Create Database Primary data port on data-network
      openstack.cloud.port:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-primary-data-port"
        network: "{{ _data_net.networks[0].id }}"
        security_groups:
          - "{{ demo_sg }}"
        state: present
      tags: pg

    - name: Look up Database Primary data port ID
      openstack.cloud.port_info:
        cloud: "{{ os_cloud }}"
        filters:
          name: "{{ demo_prefix }}database-primary-data-port"
          project_id: "{{ os_project_id }}"
      register: _db_primary_port_info
      tags: pg

    - name: Create Database Primary server (prod-network + data-network via port)
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-primary"
        boot_volume: "{{ demo_prefix }}database-primary-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _prod_net.networks[0].id }}"
          - port-id: "{{ _db_primary_port_info.ports[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        volumes:
          - "{{ demo_prefix }}database-primary-datavol"
        auto_ip: false
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      when: _db_primary_port_info.ports | length > 0
      tags: pg

    - name: Get Database Primary prod-network fixed IP
      ansible.builtin.shell:
        cmd: >-
          {{ openstack_bin }} port list
          --server {{ demo_prefix }}database-primary
          --network {{ _prod_net.networks[0].id }}
          -f value -c "Fixed IP Addresses"
          | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
          | head -1
      environment: "{{ os_env }}"
      register: _db_primary_fixed_ip
      changed_when: false
      tags: pg

    - name: Find external network for floating IP allocation
      ansible.builtin.command:
        cmd: "{{ openstack_bin }} network list --external -f value -c ID"
      environment: "{{ os_env }}"
      register: _ext_net_id
      changed_when: false
      tags: pg

    - name: Allocate floating IP for Database Primary
      ansible.builtin.command:
        cmd: >-
          {{ openstack_bin }} floating ip create
          {{ _ext_net_id.stdout_lines[0] }}
          -f value -c floating_ip_address
      environment: "{{ os_env }}"
      register: _db_fip
      when: _db_primary_fixed_ip.stdout | length > 0
      tags: pg

    - name: Associate floating IP to Database Primary prod-network port
      ansible.builtin.command:
        cmd: >-
          {{ openstack_bin }} server add floating ip
          --fixed-ip-address {{ _db_primary_fixed_ip.stdout | trim }}
          {{ demo_prefix }}database-primary
          {{ _db_fip.stdout | trim }}
      environment: "{{ os_env }}"
      when: _db_fip is not skipped
      tags: pg

    - name: Create Database Replica boot volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-replica-bootvol"
        size: 1
        image: cirros
        state: present
        wait: true
      tags: pg

    - name: Create Database Replica data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-replica-datavol"
        size: 4
        state: present
        wait: true
      tags: pg

    - name: Create Database Replica server (data-network, no floating IP)
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-replica"
        boot_volume: "{{ demo_prefix }}database-replica-bootvol"
        flavor: m1.tiny
        nics:
          - net-id: "{{ _data_net.networks[0].id }}"
        key_name: "{{ demo_keypair }}"
        security_groups:
          - "{{ demo_sg }}"
        volumes:
          - "{{ demo_prefix }}database-replica-datavol"
        auto_ip: false
        userdata: "{{ lookup('file', cloud_init_file) }}"
        state: present
        wait: true
      tags: pg

    # ── Phase 3: Verify ───────────────────────────────────────────────────────

    - name: Collect server info for all demo VMs
      openstack.cloud.server_info:
        cloud: "{{ os_cloud }}"
        server: "{{ item }}"
        filters:
          project_id: "{{ os_project_id }}"
      register: _server_check
      loop:
        - "{{ demo_prefix }}firewall-vm"
        - "{{ demo_prefix }}webapp-lb"
        - "{{ demo_prefix }}webapp-fe"
        - "{{ demo_prefix }}webapp-be"
        - "{{ demo_prefix }}database-primary"
        - "{{ demo_prefix }}database-replica"
      tags: always

    - name: Report server states
      ansible.builtin.debug:
        msg: >-
          {{ item.item }}: {{
            (item.servers | first).vm_state | default('not found')
            if item.servers | length > 0
            else 'not found'
          }}
      loop: "{{ _server_check.results }}"
      loop_control:
        label: "{{ item.item }}"
      tags: always
