---
# teardown_tenant.yml
# Delete all demo OpenStack tenant resources: servers, volumes, ports.
# Does NOT touch networks, security groups, keypairs, images, or backup targets.
# Safe to run against a partially-built environment — missing resources are skipped.
#
# Usage — all demos:
#   ansible-playbook playbooks/teardown_tenant.yml
#
# Usage — single demo:
#   ansible-playbook playbooks/teardown_tenant.yml --tags fw
#   ansible-playbook playbooks/teardown_tenant.yml --tags app
#   ansible-playbook playbooks/teardown_tenant.yml --tags pg

- name: Teardown demo tenant resources
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/main.yml
  vars:
    ansible_python_interpreter: "{{ lookup('env', 'VIRTUAL_ENV') }}/bin/python3"
  environment:
    OS_CLIENT_CONFIG_FILE: "{{ playbook_dir }}/../clouds.yaml"

  tasks:

    # ── Phase 1: Delete servers ────────────────────────────────────────────────
    # Wait for each server to reach DELETED before moving on — volumes cannot
    # be deleted while still attached to a running or shutoff instance.

    - name: Delete Firewall server
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-vm"
        state: absent
        wait: true
      failed_when: false
      tags: fw

    - name: Delete WebApp servers
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        state: absent
        wait: true
      loop:
        - "{{ demo_prefix }}webapp-lb"
        - "{{ demo_prefix }}webapp-fe"
        - "{{ demo_prefix }}webapp-be"
      failed_when: false
      tags: app

    - name: Delete Database servers
      openstack.cloud.server:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        state: absent
        wait: true
      loop:
        - "{{ demo_prefix }}database-primary"
        - "{{ demo_prefix }}database-replica"
      failed_when: false
      tags: pg

    # ── Phase 2: Delete data volumes ──────────────────────────────────────────

    - name: Delete Firewall data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-datavol"
        state: absent
        wait: true
      failed_when: false
      tags: fw

    - name: Delete WebApp BE data volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}webapp-be-datavol"
        state: absent
        wait: true
      failed_when: false
      tags: app

    - name: Delete Database data volumes
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        state: absent
        wait: true
      loop:
        - "{{ demo_prefix }}database-primary-datavol"
        - "{{ demo_prefix }}database-replica-datavol"
      failed_when: false
      tags: pg

    # ── Phase 3: Delete boot volumes ──────────────────────────────────────────

    - name: Delete Firewall boot volume
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}firewall-bootvol"
        state: absent
        wait: true
      failed_when: false
      tags: fw

    - name: Delete WebApp boot volumes
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        state: absent
        wait: true
      loop:
        - "{{ demo_prefix }}webapp-lb-bootvol"
        - "{{ demo_prefix }}webapp-fe-bootvol"
        - "{{ demo_prefix }}webapp-be-bootvol"
      failed_when: false
      tags: app

    - name: Delete Database boot volumes
      openstack.cloud.volume:
        cloud: "{{ os_cloud }}"
        name: "{{ item }}"
        state: absent
        wait: true
      loop:
        - "{{ demo_prefix }}database-primary-bootvol"
        - "{{ demo_prefix }}database-replica-bootvol"
      failed_when: false
      tags: pg

    # ── Phase 4: Delete ports ─────────────────────────────────────────────────

    - name: Delete Database Primary data port
      openstack.cloud.port:
        cloud: "{{ os_cloud }}"
        name: "{{ demo_prefix }}database-primary-data-port"
        state: absent
      failed_when: false
      tags: pg

    # ── Phase 5: Report ───────────────────────────────────────────────────────

    - name: Teardown complete
      ansible.builtin.debug:
        msg: "Demo tenant resources deleted."
      tags: always
